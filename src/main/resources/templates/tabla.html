<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips El Salvador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-3">
        <img alt="Logo" th:src="@{/images/logo.png}" width="100" height="100" class="mb-3">

        <div class="card shadow">
            <div class="card-header bg-white border-bottom-0">
                <h1 class="h3 mb-0 text-dark">Trips en El Salvador</h1>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Imagen</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha publicación</th>
                            <th>Costo</th>
                            <th>Descripción</th>
                            <th>Destacado</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="trip : ${trips}">
                            <td>
                                <img th:src="@{/images/{img}(img=${trip.imagen})}" width="80" height="80" class="rounded shadow-sm" />
                            </td>
                            <td th:text="${trip.id}"></td>
                            <td th:text="${trip.nomTrip}"></td>
                            <td th:text="${#dates.format(trip.fecha, 'dd-MM-yyyy')}"></td>
                            <td th:text="${'$' + trip.costo}"></td>
                            <td th:text="${trip.descripcion}"></td>
                            <td>
                                <span th:if="${trip.destacado == 1}" class="badge bg-success text-uppercase">Si</span>
                                <span th:unless="${trip.destacado == 1}" class="badge bg-danger text-uppercase">No</span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/detalle/{id}(id=${trip.id})}" class="btn btn-success btn-sm">Detalle</a>
                                    
                                    <a th:href="@{/eliminar/{id}(id=${trip.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
